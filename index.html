            animation: gradient 15s ease infinite;
            min-height: 100vh;
            color: #1a1a1a;
        }

            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

            border-bottom: 2px solid #ff7f27;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            color: #666;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 127, 39, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filters select {
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            font-family: inherit;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .filters select:hover {
            border-color: #ff7f27;
            box-shadow: 0 2px 8px rgba(255, 127, 39, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255, 127, 39, 0.2);
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ipo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .ipo-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .ipo-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(255, 127, 39, 0.25);
            border-color: #ff7f27;
        }

        .ipo-card-header {
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            color: white;
            padding: 20px;
            position: relative;
        }

        .ipo-card-score {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .ipo-card-code {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .ipo-card-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .ipo-card-date {
            font-size: 13px;
            opacity: 0.95;
        }

        .ipo-card-body {
            padding: 20px;
        }

        .ipo-description {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .ipo-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .ipo-info-label {
            color: #999;
        }

        .ipo-info-value {
            font-weight: 600;
            color: #1a1a1a;
        }

        .ipo-chart-container {
            margin-top: 15px;
            height: 180px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        th {
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tr:hover {
            background: #fafaf8;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-win {
            background: rgba(76, 175, 80, 0.2);
            color: #2e7d32;
        }

        .badge-loss {
            background: rgba(244, 67, 54, 0.2);
            color: #c62828;
        }

        .percent {
            color: #ff7f27;
            font-weight: 600;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .logo {
                font-size: 20px;
            }

            .tabs {
                gap: 10px;

            }

            .tab-btn {
                flex: 1;
                font-size: 14px;
                padding: 8px 12px;
            }

            .ipo-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px 12px;
            }
        }
    </style>

                            },
                            grid: {
                                color: 'rgba(255, 127, 39, 0.1)',
                                lineWidth: 1.5
                            },
                            pointLabels: {
                                font: { size: 12, weight: 'bold' },
                                color: '#666'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function renderUpcoming() {
            const html = upcoming.map((d, idx) => {
                const scores = [
                    Math.min(100, d.score + Math.random() * 10 - 5),
                    Math.min(100, d.score - 5 + Math.random() * 10),
                    Math.min(100, d.score + Math.random() * 8),
                    Math.min(100, d.score + 3 + Math.random() * 8),
                    Math.min(100, d.score + Math.random() * 12)
                ];

                return `
                    <div class="ipo-card">
                        <div class="ipo-card-header">
                            <div class="ipo-card-score">${d.score}/100</div>
                            <div class="ipo-card-code">${d.code}</div>
                            <div class="ipo-card-name">${d.name}</div>
                            <div class="ipo-card-date">📅 ${d.date}</div>
                        </div>
                        <div class="ipo-card-body">
                            <div class="ipo-description">${d.description}</div>
                            <div class="ipo-info-row">
                                <span class="ipo-info-label">BB期間:</span>
                                <span class="ipo-info-value">${d.bookbuilding}</span>
                            </div>
                            <div class="ipo-info-row">
                                <span class="ipo-info-label">仮条件:</span>
                                <span class="ipo-info-value">${d.offeringPrice}</span>
                            </div>
                            <div class="ipo-chart-container">
                                <canvas id="chart-${idx}"></canvas>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('upcomingGrid').innerHTML = html;

            // チャート作成
            upcoming.forEach((d, idx) => {
                setTimeout(() => {
                    const scores = [
                        Math.min(100, d.score + Math.random() * 10 - 5),
                        Math.min(100, d.score - 5 + Math.random() * 10),
                        Math.min(100, d.score + Math.random() * 8),
                        Math.min(100, d.score + 3 + Math.random() * 8),
                        Math.min(100, d.score + Math.random() * 12)
                    ];
                    createRadarChart(`chart-${idx}`, scores);
                }, 100 * idx);
            });
        }

        function filterData() {
            const year = document.getElementById('yearFilter').value;
            const month = document.getElementById('monthFilter').value;

            let filtered = history;
            if (year) filtered = filtered.filter(d => d.date.startsWith(year));
            if (month) filtered = filtered.filter(d => d.date.substring(5, 7) === month);

            renderHistory(filtered);
            updateStats(filtered);
        }

        function renderHistory(data) {
            const html = data.map(d => {
                const rate = ((d.initial - d.offering) / d.offering * 100).toFixed(1);
                const win = d.initial >= d.offering;
                return `
                    <tr>
                        <td>${d.date}</td>
                        <td><strong>${d.code}</strong></td>
                        <td>${d.name}</td>
                        <td>¥${d.offering.toLocaleString()}</td>
                        <td>¥${d.initial.toLocaleString()}</td>
                        <td><span class="percent">${rate}%</span></td>
                        <td><span class="badge ${win ? 'badge-win' : 'badge-loss'}">${win ? '✅ 勝' : '❌ 負'}</span></td>
                    </tr>
                `;
            }).join('');

            document.querySelector('#historyTable tbody').innerHTML = html || '<tr><td colspan="7" class="empty">データなし</td></tr>';
        }

        function updateStats(data) {
            document.getElementById('totalCount').textContent = data.length;

            if (data.length === 0) {
                document.getElementById('avgRate').textContent = '-';
                document.getElementById('winRate').textContent = '-';
                document.getElementById('maxRate').textContent = '-';
                return;
            }

            const rates = data.map(d => (d.initial - d.offering) / d.offering * 100);
            const avg = (rates.reduce((a, b) => a + b, 0) / rates.length).toFixed(1);
            document.getElementById('avgRate').textContent = `${avg}%`;

            const wins = data.filter(d => d.initial >= d.offering).length;
            const wr = ((wins / data.length) * 100).toFixed(0);
            document.getElementById('winRate').textContent = `${wr}%`;

            const max = Math.max(...rates).toFixed(1);
            document.getElementById('maxRate').textContent = `${max}%`;
        }

        function switchTab(i) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section')[i].classList.add('active');
            document.querySelectorAll('.tab-btn')[i].classList.add('active');

            if (i === 1) filterData();
        }

        window.addEventListener('load', () => {
            renderUpcoming();
            filterData();
        });
    </script>
</body>
</html>
