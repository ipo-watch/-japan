<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO Watch - 日本IPO銘柄情報データベース</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            color: #1a1a1a;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #ff7f27;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            color: #666;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 127, 39, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filters select {
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            font-family: inherit;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .filters select:hover {
            border-color: #ff7f27;
            box-shadow: 0 2px 8px rgba(255, 127, 39, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255, 127, 39, 0.2);
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ipo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .ipo-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .ipo-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(255, 127, 39, 0.25);
            border-color: #ff7f27;
        }

        .ipo-card-header {
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            color: white;
            padding: 20px;
            position: relative;
        }

        .ipo-card-score {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .ipo-card-code {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .ipo-card-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .ipo-card-date {
            font-size: 13px;
            opacity: 0.95;
        }

        .ipo-card-body {
            padding: 20px;
        }

        .ipo-description {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .ipo-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .ipo-info-label {
            color: #999;
        }

        .ipo-info-value {
            font-weight: 600;
            color: #1a1a1a;
        }

        .ipo-chart-container {
            margin-top: 15px;
            height: 180px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        th {
            background: linear-gradient(135deg, #ff7f27 0%, #ff9d4d 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tr:hover {
            background: #fafaf8;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-win {
            background: rgba(76, 175, 80, 0.2);
            color: #2e7d32;
        }

        .badge-loss {
            background: rgba(244, 67, 54, 0.2);
            color: #c62828;
        }

        .percent {
            color: #ff7f27;
            font-weight: 600;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .logo {
                font-size: 20px;
            }

            .tabs {
                gap: 10px;
                width: 100%;
            }

            .tab-btn {
                flex: 1;
                font-size: 14px;
                padding: 8px 12px;
            }

            .ipo-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📈 IPO Watch</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">🔔 近日上場</button>
            <button class="tab-btn" onclick="switchTab(1)">📊 過去6年</button>
        </div>
    </div>

    <div class="container">
        <!-- 近日上場 -->
        <div class="section active">
            <h1>🔔 近日上場IPO銘柄</h1>
            <div class="ipo-grid" id="upcomingGrid"></div>
        </div>

        <!-- 過去6年 -->
        <div class="section">
            <h1>📊 過去6年のIPO銘柄</h1>

            <div class="filters">
                <select id="yearFilter" onchange="filterData()">
                    <option value="">全年</option>
                    <option value="2025">2025年</option>
                    <option value="2024">2024年</option>
                    <option value="2023">2023年</option>
                    <option value="2022">2022年</option>
                    <option value="2021">2021年</option>
                </select>
                <select id="monthFilter" onchange="filterData()">
                    <option value="">全月</option>
                    <option value="01">1月</option>
                    <option value="02">2月</option>
                    <option value="03">3月</option>
                    <option value="04">4月</option>
                    <option value="05">5月</option>
                    <option value="06">6月</option>
                    <option value="07">7月</option>
                    <option value="08">8月</option>
                    <option value="09">9月</option>
                    <option value="10">10月</option>
                    <option value="11">11月</option>
                    <option value="12">12月</option>
                </select>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">IPO数</div>
                    <div class="stat-value" id="totalCount">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均上昇率</div>
                    <div class="stat-value" id="avgRate">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">勝率</div>
                    <div class="stat-value" id="winRate">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最高上昇率</div>
                    <div class="stat-value" id="maxRate">-</div>
                </div>
            </div>

            <table id="historyTable">
                <thead>
                    <tr>
                        <th>上場日</th>
                        <th>コード</th>
                        <th>銘柄名</th>
                        <th>公募価格</th>
                        <th>初値</th>
                        <th>上昇率</th>
                        <th>結果</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const upcoming = [
            { code: '550A', name: 'ソフトテックス', date: '2026-04-09', bookbuilding: '03/24～03/30', offeringPrice: '-', description: 'IoTソリューションの開発・提供企業。企業向けのスマートファクトリーシステムを手がける。', score: 82 },
            { code: '549A', name: 'ヒトトホールディングス', date: '2026-04-07', bookbuilding: '03/19～03/26', offeringPrice: '-', description: '人材育成・研修サービスを展開。企業の人的資本投資をサポートするプラットフォーム。', score: 75 },
            { code: '548A', name: 'システムエグゼ', date: '2026-04-06', bookbuilding: '03/19～03/26', offeringPrice: '-', description: 'システム開発・ITコンサルティング企業。DX化推進をサポート。', score: 78 },
            { code: '542A', name: 'ビタブリッドジャパン', date: '2026-04-02', bookbuilding: '03/17～03/24', offeringPrice: '-', description: 'ビタミン配合の医薬品・健康食品を開発。美容・健康領域での成長が期待される。', score: 85 },
            { code: '529A', name: 'レクメド', date: '2026-04-02', bookbuilding: '03/17～03/23', offeringPrice: '-', description: '医療用ロボット・機器メーカー。手術支援ロボットの開発・販売を行う。', score: 88 },
            { code: '523A', name: 'セイワホールディングス', date: '2026-03-27', bookbuilding: '03/11～03/17', offeringPrice: '1,230円～1,250円', description: '自動車部品メーカーの持株会社。電動化対応の部品開発が成長ドライバー。', score: 79 },
            { code: '520A', name: 'ジェイファーマ', date: '2026-03-25', bookbuilding: '03/06～03/12', offeringPrice: '840円～900円', description: '医薬品開発企業。バイオテク分野での革新的な治療薬パイプラインを保有。', score: 86 },
            { code: '519A', name: 'ベーシック', date: '2026-03-25', bookbuilding: '03/06～03/12', offeringPrice: '830円～870円', description: 'クラウドサービス企業。企業向けのデータ分析プラットフォームを展開。', score: 81 }
        ];

        const history = [
            { date: '2025-12-25', code: '480A', name: 'リブ・ コンサルティング', offering: 920, initial: 1400 },
            { date: '2025-12-24', code: '478A', name: 'フツパー', offering: 1020, initial: 1344 },
            { date: '2025-12-24', code: '479A', name: 'PRONI', offering: 1750, initial: 1875 },
            { date: '2024-12-27', code: '302A', name: 'ビースタイル ホールディングス', offering: 2070, initial: 3325 },
            { date: '2024-12-26', code: '303A', name: 'visumo', offering: 770, initial: 1036 },
            { date: '2024-12-26', code: '304A', name: 'フォルシア', offering: 1750, initial: 3640 },
            { date: '2024-03-29', code: '157A', name: 'グリーンモンスター', offering: 980, initial: 1700 },
            { date: '2024-02-28', code: '137A', name: 'Cocolive', offering: 1780, initial: 3990 },
            { date: '2023-12-27', code: '5892', name: 'yutori', offering: 2520, initial: 2829 },
            { date: '2023-11-29', code: '278A', name: 'Terra Drone', offering: 2350, initial: 2162 },
            { date: '2023-10-27', code: '4811', name: 'ドリーム・アーツ', offering: 2660, initial: 3005 },
            { date: '2023-09-27', code: '5591', name: 'AVILEN', offering: 2120, initial: 2482 },
            { date: '2022-12-29', code: '9342', name: 'スマサポ', offering: 800, initial: 2250 },
            { date: '2022-12-27', code: '5246', name: 'ELEMENTS', offering: 160, initial: 312 },
            { date: '2022-11-30', code: '9565', name: 'ウェルプレイド・ ライゼスト', offering: 1170, initial: 6200 },
            { date: '2021-12-29', code: '4265', name: 'Institution for a Global Society', offering: 1720, initial: 2002 },
            { date: '2021-12-27', code: '4264', name: 'セキュア', offering: 950, initial: 2185 },
            { date: '2021-11-30', code: '4413', name: 'ボードルア', offering: 2000, initial: 2750 },
            { date: '2021-10-26', code: '4378', name: 'CINC', offering: 3080, initial: 3950 }
        ];

        function createRadarChart(containerId, scores) {
            const ctx = document.getElementById(containerId);
            if (!ctx) return;

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['成長性', '収益性', '市場規模', 'ブランド力', 'テック度'],
                    datasets: [{
                        label: 'スコア',
                        data: scores,
                        borderColor: '#ff7f27',
                        backgroundColor: 'rgba(255, 127, 39, 0.15)',
                        pointBackgroundColor: '#ff7f27',
                        pointBorderColor: '#fff',
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        borderWidth: 2.5,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: {
                                display: false
                            },
                            grid: {
                                color: 'rgba(255, 127, 39, 0.1)',
                                lineWidth: 1.5
                            },
                            pointLabels: {
                                font: { size: 12, weight: 'bold' },
                                color: '#666'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function renderUpcoming() {
            const html = upcoming.map((d, idx) => {
                const scores = [
                    Math.min(100, d.score + Math.random() * 10 - 5),
                    Math.min(100, d.score - 5 + Math.random() * 10),
                    Math.min(100, d.score + Math.random() * 8),
                    Math.min(100, d.score + 3 + Math.random() * 8),
                    Math.min(100, d.score + Math.random() * 12)
                ];

                return `
                    <div class="ipo-card">
                        <div class="ipo-card-header">
                            <div class="ipo-card-score">${d.score}/100</div>
                            <div class="ipo-card-code">${d.code}</div>
                            <div class="ipo-card-name">${d.name}</div>
                            <div class="ipo-card-date">📅 ${d.date}</div>
                        </div>
                        <div class="ipo-card-body">
                            <div class="ipo-description">${d.description}</div>
                            <div class="ipo-info-row">
                                <span class="ipo-info-label">BB期間:</span>
                                <span class="ipo-info-value">${d.bookbuilding}</span>
                            </div>
                            <div class="ipo-info-row">
                                <span class="ipo-info-label">仮条件:</span>
                                <span class="ipo-info-value">${d.offeringPrice}</span>
                            </div>
                            <div class="ipo-chart-container">
                                <canvas id="chart-${idx}"></canvas>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('upcomingGrid').innerHTML = html;

            // チャート作成
            upcoming.forEach((d, idx) => {
                setTimeout(() => {
                    const scores = [
                        Math.min(100, d.score + Math.random() * 10 - 5),
                        Math.min(100, d.score - 5 + Math.random() * 10),
                        Math.min(100, d.score + Math.random() * 8),
                        Math.min(100, d.score + 3 + Math.random() * 8),
                        Math.min(100, d.score + Math.random() * 12)
                    ];
                    createRadarChart(`chart-${idx}`, scores);
                }, 100 * idx);
            });
        }

        function filterData() {
            const year = document.getElementById('yearFilter').value;
            const month = document.getElementById('monthFilter').value;

            let filtered = history;
            if (year) filtered = filtered.filter(d => d.date.startsWith(year));
            if (month) filtered = filtered.filter(d => d.date.substring(5, 7) === month);

            renderHistory(filtered);
            updateStats(filtered);
        }

        function renderHistory(data) {
            const html = data.map(d => {
                const rate = ((d.initial - d.offering) / d.offering * 100).toFixed(1);
                const win = d.initial >= d.offering;
                return `
                    <tr>
                        <td>${d.date}</td>
                        <td><strong>${d.code}</strong></td>
                        <td>${d.name}</td>
                        <td>¥${d.offering.toLocaleString()}</td>
                        <td>¥${d.initial.toLocaleString()}</td>
                        <td><span class="percent">${rate}%</span></td>
                        <td><span class="badge ${win ? 'badge-win' : 'badge-loss'}">${win ? '✅ 勝' : '❌ 負'}</span></td>
                    </tr>
                `;
            }).join('');

            document.querySelector('#historyTable tbody').innerHTML = html || '<tr><td colspan="7" class="empty">データなし</td></tr>';
        }

        function updateStats(data) {
            document.getElementById('totalCount').textContent = data.length;

            if (data.length === 0) {
                document.getElementById('avgRate').textContent = '-';
                document.getElementById('winRate').textContent = '-';
                document.getElementById('maxRate').textContent = '-';
                return;
            }

            const rates = data.map(d => (d.initial - d.offering) / d.offering * 100);
            const avg = (rates.reduce((a, b) => a + b, 0) / rates.length).toFixed(1);
            document.getElementById('avgRate').textContent = `${avg}%`;

            const wins = data.filter(d => d.initial >= d.offering).length;
            const wr = ((wins / data.length) * 100).toFixed(0);
            document.getElementById('winRate').textContent = `${wr}%`;

            const max = Math.max(...rates).toFixed(1);
            document.getElementById('maxRate').textContent = `${max}%`;
        }

        function switchTab(i) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section')[i].classList.add('active');
            document.querySelectorAll('.tab-btn')[i].classList.add('active');

            if (i === 1) filterData();
        }

        window.addEventListener('load', () => {
            renderUpcoming();
            filterData();
        });
    </script>
</body>
</html>
