<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウォッチリスト - IPO Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientShift {
            0% {
                background: linear-gradient(135deg, #ffffff 0%, #e8f7f6 50%, #f0fffe 100%);
            }
            25% {
                background: linear-gradient(45deg, #e8f7f6 0%, #f0fffe 50%, #ffffff 100%);
            }
            50% {
                background: linear-gradient(225deg, #f0fffe 0%, #ffffff 50%, #e8f7f6 100%);
            }
            75% {
                background: linear-gradient(315deg, #ffffff 0%, #e8f7f6 50%, #f0fffe 100%);
            }
            100% {
                background: linear-gradient(135deg, #ffffff 0%, #e8f7f6 50%, #f0fffe 100%);
            }
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #e8f7f6 50%, #f0fffe 100%);
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: #2c3e50;
        }

        .header {
            background: #ffffff;
            border-bottom: 2px solid #20b2aa;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: none;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #20b2aa;
            text-decoration: none;
            cursor: pointer;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .back-btn {
            background: #20b2aa;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: #1a8b7e;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            color: #20b2aa;
            margin-bottom: 30px;
            font-size: 32px;
            text-align: center;
        }

        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .watchlist-card {
            background: white;
            border: 1px solid #e8f7f6;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .watchlist-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(32, 178, 170, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            border-bottom: 2px solid #e8f7f6;
            padding-bottom: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        .card-code {
            background: #20b2aa;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .info-label {
            color: #7f8c8d;
            font-weight: 500;
        }

        .info-value {
            color: #2c3e50;
            font-weight: 600;
        }

        .gain-rate {
            color: #27ae60;
            font-weight: 700;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-visit {
            background: #20b2aa;
            color: white;
        }

        .btn-visit:hover {
            background: #1a8b7e;
        }

        .btn-remove {
            background: #ecf0f1;
            color: #e74c3c;
        }

        .btn-remove:hover {
            background: #e74c3c;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #95a5a6;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .stats {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            text-align: center;
        }

        .stat-item h3 {
            color: #20b2aa;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .stat-item p {
            color: #7f8c8d;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 24px;
            }

            .watchlist-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">📈 IPO Watch</a>
        <button class="back-btn" onclick="location.href='index.html'">← メインに戻る</button>
    </div>

    <div class="container">
        <h1>⭐ マイウォッチリスト</h1>

        <div id="stats" class="stats" style="display: none;">
            <div class="stat-item">
                <h3 id="total-count">0</h3>
                <p>登録銘柄数</p>
            </div>
            <div class="stat-item">
                <h3 id="avg-gain">0%</h3>
                <p>平均期待利益率</p>
            </div>
            <div class="stat-item">
                <h3 id="market-split"></h3>
                <p>市場別</p>
            </div>
        </div>

        <div id="watchlistContainer" class="watchlist-grid"></div>
        <div id="emptyState" class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-text">ウォッチリストに登録されたIPO銘柄がありません</div>
            <button class="back-btn" onclick="location.href='index.html'">IPO一覧に戻る</button>
        </div>
    </div>

    <script>
        // ウォッチリストを取得・表示
        function loadWatchlist() {
            const watchlist = JSON.parse(localStorage.getItem('ipoWatchlist') || '[]');
            const container = document.getElementById('watchlistContainer');
            const emptyState = document.getElementById('emptyState');
            const stats = document.getElementById('stats');

            if (watchlist.length === 0) {
                emptyState.style.display = 'block';
                container.style.display = 'none';
                stats.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            container.style.display = 'grid';
            stats.style.display = 'grid';

            // 統計情報を計算
            let totalGain = 0;
            let markets = {};

            watchlist.forEach(item => {
                const gain = parseInt(item.expectedGainRate) || 0;
                totalGain += gain;

                const market = item.marketType || '不明';
                markets[market] = (markets[market] || 0) + 1;
            });

            // 統計情報を表示
            document.getElementById('total-count').textContent = watchlist.length;
            document.getElementById('avg-gain').textContent = Math.round(totalGain / watchlist.length) + '%';

            const marketText = Object.entries(markets)
                .map(([market, count]) => `${market} ${count}`)
                .join(' / ');
            document.getElementById('market-split').textContent = marketText;

            // ウォッチリストアイテムを表示
            container.innerHTML = watchlist.map(item => `
                <div class="watchlist-card">
                    <div class="card-header">
                        <div>
                            <div class="card-title">${item.name}</div>
                        </div>
                        <div class="card-code">${item.code}</div>
                    </div>

                    <div class="card-info">
                        <div class="info-row">
                            <span class="info-label">市場</span>
                            <span class="info-value">${item.marketType || '不明'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">カテゴリ</span>
                            <span class="info-value">${item.category || '不明'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">上場予定日</span>
                            <span class="info-value">${item.date || '不明'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">想定価格</span>
                            <span class="info-value">${item.offeringPrice || '不明'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">期待利益率</span>
                            <span class="gain-rate">${item.expectedGainRate || '0'}%</span>
                        </div>
                    </div>

                    <div class="card-actions">
                        ${item.website ? `
                            <a href="${item.website}" target="_blank" style="flex: 1;">
                                <button class="btn btn-visit">企業サイト →</button>
                            </a>
                        ` : ''}
                        <button class="btn btn-remove" onclick="removeFromWatchlist('${item.code}')">削除</button>
                    </div>
                </div>
            `).join('');
        }

        // ウォッチリストから削除
        function removeFromWatchlist(code) {
            if (confirm(`${code}をウォッチリストから削除しますか？`)) {
                let watchlist = JSON.parse(localStorage.getItem('ipoWatchlist') || '[]');
                watchlist = watchlist.filter(item => item.code !== code);
                localStorage.setItem('ipoWatchlist', JSON.stringify(watchlist));
                loadWatchlist();
                alert('削除しました');
            }
        }

        // ページロード時に実行
        document.addEventListener('DOMContentLoaded', loadWatchlist);
    </script>
</body>
</html>
